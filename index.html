<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activated Charcoal Tool 2026 - Table 4 Exact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .strong { background-color: #166534; color: white; }
        .weak { background-color: #1e40af; color: white; }
        .none { background-color: #991b1b; color: white; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
<div class="max-w-4xl mx-auto p-6">

    <h1 class="text-4xl font-black mb-1">Activated Charcoal Tool 2026</h1>
    <p class="text-slate-600 mb-8">Strictly aligned with Table 4 — Clinical Toxicology Recommendations Collaborative</p>

    <!-- Safety Checklist -->
    <div class="bg-amber-50 border border-amber-300 rounded-2xl p-6 mb-8">
        <h3 class="font-bold text-amber-900 mb-3">✅ Mandatory Safety Checks</h3>
        <label class="flex items-center gap-3 mb-2">
            <input type="checkbox" id="airway" class="w-5 h-5 accent-emerald-600">
            Airway protected (intact reflexes or intubated)
        </label>
        <label class="flex items-center gap-3">
            <input type="checkbox" id="gi" class="w-5 h-5 accent-emerald-600">
            No risk of GI perforation or obstruction
        </label>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-8 space-y-8">
        <div>
            <label class="block text-sm font-semibold text-slate-500 mb-2">1. Poison</label>
            <select id="drug" class="w-full p-4 border-2 border-slate-200 rounded-2xl text-lg" onchange="runRecommendation()">
                <option value="">-- Select Poison --</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-500 mb-2">2. Formulation</label>
            <div class="flex gap-3">
                <button onclick="setForm('IR')" id="btnIR" class="flex-1 py-4 font-bold rounded-2xl border-2 border-slate-900 bg-slate-900 text-white">IR</button>
                <button onclick="setForm('MR')" id="btnMR" class="flex-1 py-4 font-bold rounded-2xl border-2">MR</button>
            </div>
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-500 mb-2">3. Hours since ingestion</label>
            <input type="range" id="hours" min="0" max="24" step="0.1" value="2" class="w-full" oninput="updateHours()">
            <div class="text-center font-bold text-2xl mt-2" id="hours_val">2.0 hours</div>
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-500 mb-2">4. Estimated Dose (optional)</label>
            <div class="flex gap-3">
                <input type="number" id="dose" placeholder="e.g. 10" class="flex-1 p-4 border-2 border-slate-200 rounded-2xl">
                <select id="unit" class="p-4 border-2 border-slate-200 rounded-2xl">
                    <option value="mgkg">mg/kg</option>
                    <option value="g">g</option>
                    <option value="TD">TD</option>
                </select>
            </div>
        </div>

        <button onclick="runRecommendation()" class="w-full py-6 bg-slate-900 hover:bg-black text-white font-black text-xl rounded-3xl">
            GET RECOMMENDATION
        </button>
    </div>

    <div id="result" class="hidden mt-8 bg-white rounded-3xl shadow-xl p-8">
        <h2 id="drug_name" class="text-3xl font-black mb-4"></h2>
        <div id="status" class="p-8 rounded-2xl text-center text-2xl font-black mb-6"></div>
        <div id="details" class="text-sm space-y-3"></div>
    </div>
</div>

// =========================
// Internal DB Validator
// =========================
function validateDb() {
    const allowedRecs = ["strong", "weak", "none"];
    let ok = true;
    Object.entries(db).forEach(([key, drug]) => {
        ["IR", "MR"].forEach(form => {
            const d = drug[form];
            if (!d) return;
            if (!allowedRecs.includes(d.rec)) {
                console.error(`Invalid rec for ${key} ${form}`);
                ok = false;
            }
            if (typeof d.maxHours !== "number") {
                console.error(`Invalid maxHours for ${key} ${form}`);
                ok = false;
            }
            if (d.threshold == null) {
                console.error(`Missing threshold for ${key} ${form}`);
                ok = false;
            }
        });
    });
    if (ok) {
        console.log(`DB validation passed for ${Object.keys(db).length} poisons.`);
    }
}

let currentForm = "IR";

function populateDrugs() {
    const select = document.getElementById("drug");
    select.innerHTML = '<option value="">-- Select Poison --</option>';
    Object.keys(db).forEach(key => {
        const opt = document.createElement("option");
        opt.value = key;
        opt.textContent = db[key].name;
        select.appendChild(opt);
    });
}

function setForm(f) {
    currentForm = f;
    const btnIR = document.getElementById("btnIR");
    const btnMR = document.getElementById("btnMR");

    if (f === "IR") {
        btnIR.classList.add("bg-slate-900", "text-white", "border-slate-900");
        btnMR.classList.remove("bg-slate-900", "text-white", "border-slate-900");
    } else {
        btnMR.classList.add("bg-slate-900", "text-white", "border-slate-900");
        btnIR.classList.remove("bg-slate-900", "text-white", "border-slate-900");
    }
    runRecommendation();
}

function updateHours() {
    const h = parseFloat(document.getElementById("hours").value);
    document.getElementById("hours_val").textContent = h.toFixed(1) + " hours";
    runRecommendation();
}

function parseNumericThreshold(thresholdText) {
    // Take the first numeric value in the threshold string
    const match = thresholdText.match(/[\d.]+/);
    if (!match) return null;
    return parseFloat(match[0]);
}

function getThresholdUnit(thresholdText) {
    if (thresholdText.includes("mg/kg")) return "mgkg";
    if (thresholdText.includes("g")) return "g";
    if (thresholdText.includes("TD")) return "TD";
    if (thresholdText.includes("µg/kg")) return "mgkg"; // treat as mg/kg scale for comparison (approx)
    return null;
}

function buildAdacMessage(drugData, hours, doseVal, doseUnit) {
    if (!doseVal || isNaN(doseVal)) return "Dose not provided — ADAC may be considered only if prolonged absorption or very large ingestion is suspected.";
    const thText = drugData.threshold;
    if (thText === "Any dose" || thText === "Individual Risk") {
        return `Threshold: ${thText}. Use individual risk assessment for ADAC in the context of ongoing absorption or massive ingestion.`;
    }
    const thNum = parseNumericThreshold(thText);
    const thUnit = getThresholdUnit(thText);
    if (!thNum || !thUnit || thUnit !== doseUnit) {
        return `Threshold: ${thText}. Entered dose cannot be strictly compared, but if ingestion is clinically large, consider ADAC when ongoing absorption is suspected.`;
    }
    if (doseVal >= thNum) {
        return `Entered dose (${doseVal} ${doseUnit}) is ≥ threshold (${thText}). If gastric contents are likely to persist (MR, pharmacobezoar, gastroparesis), consider additional-dose AC (ADAC).`;
    } else {
        return `Entered dose (${doseVal} ${doseUnit}) is < threshold (${thText}). ADAC is usually not indicated solely on dose; consider only if there is clear evidence of prolonged absorption.`;
    }
}

function runRecommendation() {
    const key = document.getElementById("drug").value;
    if (!key) return;

    const drug = db[key];
    const hours = parseFloat(document.getElementById("hours").value);
    const doseVal = parseFloat(document.getElementById("dose").value);
    const doseUnit = document.getElementById("unit").value;

    const data = drug[currentForm] || drug.IR; // fallback to IR if MR not meaningful

    // Safety check
    if (!document.getElementById("airway").checked || !document.getElementById("gi").checked) {
        document.getElementById("status").innerHTML = "❌ SAFETY CHECK FAILED — Confirm protected airway and no GI perforation risk before considering AC.";
        document.getElementById("status").className = "p-8 rounded-2xl text-center text-xl font-black mb-6 bg-red-600 text-white";
        document.getElementById("result").classList.remove("hidden");
        document.getElementById("drug_name").textContent = drug.name + " (" + currentForm + ")";
        document.getElementById("details").innerHTML = `
            <div><strong>Threshold:</strong> ${data.threshold}</div>
            <div><strong>Maximum time window:</strong> ${data.maxHours > 0 ? data.maxHours + " hours" : "No role for AC"}</div>
        `;
        return;
    }

    let statusHTML = "";
    let statusClass = "";

    if (data.rec === "none") {
        statusHTML = "❌ NOT RECOMMENDED — Activated charcoal has no recommended role for this poison.";
        statusClass = "none";
    } else {
        if (hours <= data.maxHours) {
            if (data.rec === "strong") {
                statusHTML = "✅ STRONG RECOMMENDATION — Single-dose activated charcoal (SDAC) is recommended.";
                statusClass = "strong";
            } else if (data.rec === "weak") {
                statusHTML = "🟡 WEAK RECOMMENDATION — SDAC may be considered based on individual risk-benefit assessment.";
                statusClass = "weak";
            }
        } else if (data.suggestHours && hours > data.maxHours && hours <= data.suggestHours) {
            // Suggest window (always weak)
            statusHTML = `🟡 WEAK RECOMMENDATION — AC may still be considered (extended window up to ${data.suggestHours} hours) based on individual risk assessment.`;
            statusClass = "weak";
        } else {
            statusHTML = `⚠️ BEYOND RECOMMENDED WINDOW — AC is not recommended (time since ingestion exceeds the specified window).`;
            statusClass = "none";
        }
    }

    const adacMessage = buildAdacMessage(data, hours, doseVal, doseUnit);

    document.getElementById("result").classList.remove("hidden");
    document.getElementById("drug_name").textContent = drug.name + " (" + currentForm + ")";
    document.getElementById("status").innerHTML = statusHTML;
    document.getElementById("status").className = `p-8 rounded-2xl text-center text-2xl font-black mb-6 ${statusClass}`;

    const timeWindowText =
        data.rec === "none"
            ? "No recommended time window for AC."
            : (data.suggestHours
                ? `Strong/primary window: up to ${data.maxHours} hours. Extended weak window: up to ${data.suggestHours} hours.`
                : `Maximum recommended window: up to ${data.maxHours} hours.`);

    document.getElementById("details").innerHTML = `
        <div><strong>Formulation:</strong> ${currentForm}</div>
        <div><strong>Recommendation strength:</strong> ${
            data.rec === "strong" ? "Strong" :
            data.rec === "weak" ? "Weak" :
            "Not recommended"
        }</div>
        <div><strong>Time frame:</strong> ${timeWindowText}</div>
        <div><strong>Threshold (Min. ingested dose for intervention):</strong> ${data.threshold}</div>
        <div><strong>ADAC (Additional-dose AC):</strong> ${adacMessage}</div>
        <div class="text-xs text-slate-500 mt-4">
            This tool reflects Table 4 recommendations for SDAC/ADAC windows and thresholds, excluding MDAC and evidence grades.
        </div>
    `;
}

// Initialize
populateDrugs();
updateHours();
validateDb();
</script>
