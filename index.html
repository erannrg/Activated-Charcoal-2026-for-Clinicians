<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AC Tool 2026 - Table 4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .strong { background-color: #166534; color: white; }
        .weak   { background-color: #1e40af; color: white; }
        .none   { background-color: #991b1b; color: white; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
<div class="max-w-4xl mx-auto p-6">

    <h1 class="text-4xl font-black mb-1">Activated Charcoal Tool 2026</h1>
    <p class="text-slate-600 mb-8">Based on Excel Table - Gold Standard</p>

    <!-- Safety Checklist -->
    <div class="bg-amber-50 border border-amber-300 rounded-2xl p-6 mb-8">
        <h3 class="font-bold text-amber-900 mb-3">✅ Mandatory Safety Checks</h3>
        <label class="flex items-center gap-3 mb-2"><input type="checkbox" id="airway" class="w-5 h-5"> Protected airway (intact reflexes or intubated)</label>
        <label class="flex items-center gap-3"><input type="checkbox" id="gi" class="w-5 h-5"> No GI perforation or obstruction risk</label>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-8 space-y-8">
        <div>
            <label class="block text-sm font-semibold text-slate-500 mb-2">1. Poison</label>
            <select id="drug" class="w-full p-4 border-2 border-slate-200 rounded-2xl text-lg" onchange="runRecommendation()">
                <option value="">-- Select Poison --</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-500 mb-2">2. Formulation</label>
            <div class="flex gap-3">
                <button onclick="setForm('IR')" id="btnIR" class="flex-1 py-4 font-bold rounded-2xl border-2 border-slate-900 bg-slate-900 text-white">IR</button>
                <button onclick="setForm('MR')" id="btnMR" class="flex-1 py-4 font-bold rounded-2xl border-2">MR</button>
            </div>
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-500 mb-2">3. Hours since ingestion</label>
            <input type="range" id="hours" min="0" max="24" step="0.1" value="5" class="w-full accent-slate-900" oninput="updateHours()">
            <div class="text-center font-bold text-2xl mt-2" id="hours_val">5.0 hours</div>
        </div>

        <div>
            <label class="block text-sm font-semibold text-slate-500 mb-2">4. Estimated Dose (optional)</label>
            <div class="flex gap-3">
                <input type="number" id="dose" placeholder="Amount" class="flex-1 p-4 border-2 border-slate-200 rounded-2xl">
                <select id="unit" class="p-4 border-2 border-slate-200 rounded-2xl">
                    <option value="mgkg">mg/kg</option>
                    <option value="g">g</option>
                    <option value="TD">TD</option>
                </select>
            </div>
        </div>

        <button onclick="runRecommendation()" class="w-full py-6 bg-slate-900 hover:bg-black text-white font-black text-xl rounded-3xl">
            GET RECOMMENDATION
        </button>
    </div>

    <div id="result" class="hidden mt-8 bg-white rounded-3xl shadow-xl p-8">
        <h2 id="drug_name" class="text-3xl font-black mb-4"></h2>
        <div id="status" class="p-8 rounded-2xl text-center text-2xl font-black mb-6"></div>
        <div id="details" class="text-sm space-y-3"></div>
    </div>
</div>

<script>
// Full database from your Excel
const db = {
    "paracetamol": {name: "Acetaminophen / Paracetamol", ir: {strength:"strong", maxH:2, suggestH:4, thresh:"200 mg/kg"}, mr: {strength:"strong", maxH:5, suggestH:6, thresh:"200 mg/kg"}},
    "carbamazepine": {name: "Carbamazepine", ir: {strength:"strong", maxH:2, thresh:"25 mg/kg"}, mr: {strength:"strong", maxH:3, thresh:"25 mg/kg"}},
    "phenobarbital": {name: "Phenobarbital", ir: {strength:"strong", maxH:1, thresh:"20 mg/kg"}},
    "salicylates": {name: "Salicylates (Aspirin)", ir: {strength:"strong", maxH:2, suggestH:4, thresh:"200 mg/kg"}, mr: {strength:"weak", maxH:3, thresh:"200 mg/kg"}},
    "theophylline": {name: "Theophylline", ir: {strength:"strong", maxH:2, thresh:"20 mg/kg"}, mr: {strength:"strong", maxH:3, thresh:"20 mg/kg"}},
    "valproate": {name: "Valproic Acid", ir: {strength:"weak", maxH:1, thresh:"200 mg/kg"}, mr: {strength:"weak", maxH:4, thresh:"200 mg/kg"}},
    "opioids": {name: "Opioids", ir: {strength:"weak", maxH:1, thresh:"5 TD"}, mr: {strength:"weak", maxH:2, thresh:"5 TD"}},
    "iron": {name: "Iron", ir: {strength:"none", maxH:0, thresh:"Any dose"}},
    "lithium": {name: "Lithium", ir: {strength:"none", maxH:0, thresh:"Any dose"}},
    "metformin": {name: "Metformin", ir: {strength:"none", maxH:0, thresh:"Any dose"}},
    "digoxin": {name: "Digoxin", ir: {strength:"weak", maxH:1, thresh:"75 µg/kg"}},
    "bupropion": {name: "Bupropion", ir: {strength:"weak", maxH:1, thresh:"20 mg/kg"}, mr: {strength:"weak", maxH:3, thresh:"20 mg/kg"}},
    "amlodipine": {name: "Amlodipine (CCB)", ir: {strength:"weak", maxH:2, thresh:"5 TD"}},
    "verapamil": {name: "Verapamil (CCB)", ir: {strength:"weak", maxH:2, thresh:"3 TD"}, mr: {strength:"weak", maxH:3, thresh:"3 TD"}},
    "propranolol": {name: "Propranolol (Beta Blocker)", ir: {strength:"weak", maxH:1, thresh:"5 mg/kg"}},
    "phenytoin": {name: "Phenytoin", ir: {strength:"weak", maxH:1, thresh:"40 mg/kg"}, mr: {strength:"weak", maxH:3, thresh:"40 mg/kg"}},
    "dapsone": {name: "Dapsone", ir: {strength:"weak", maxH:2, thresh:"6 mg/kg"}},
    "tca": {name: "Tricyclic Antidepressants (TCA)", ir: {strength:"weak", maxH:2, thresh:"10 mg/kg"}},
    "ssri": {name: "SSRIs", ir: {strength:"weak", maxH:0.5, thresh:"15 TD"}},
    "chloroquine": {name: "Chloroquine", ir: {strength:"weak", maxH:1, thresh:"35 mg/kg"}},
    "colchicine": {name: "Colchicine", ir: {strength:"weak", maxH:3, thresh:"0.4 mg/kg"}},
    "quinine": {name: "Quinine", ir: {strength:"weak", maxH:1, thresh:"20 mg/kg"}},
    "venlafaxine": {name: "Venlafaxine", ir: {strength:"weak", maxH:0.5, thresh:"25 mg/kg"}, mr: {strength:"weak", maxH:3, thresh:"25 mg/kg"}},
    "warfarin": {name: "Warfarin", ir: {strength:"none", maxH:0, thresh:"0.7 mg/kg"}},
    "methotrexate": {name: "Methotrexate", ir: {strength:"weak", maxH:2, thresh:"10 mg/kg"}},
    "moclobemide": {name: "Moclobemide", ir: {strength:"weak", maxH:2, thresh:"50 mg/kg"}},
    "sulfonylureas": {name: "Sulfonylureas", ir: {strength:"weak", maxH:1, thresh:"5 TD"}},
    "paraquat": {name: "Paraquat", ir: {strength:"weak", maxH:3, thresh:"5 mg/kg"}},
    "thallium": {name: "Thallium", ir: {strength:"weak", maxH:1, thresh:"10 mg/kg"}},
    "ibuprofen": {name: "Ibuprofen", ir: {strength:"weak", maxH:2, thresh:"250 mg/kg"}},
    "isoniazid": {name: "Isoniazid", ir: {strength:"weak", maxH:1, thresh:"40 mg/kg"}},
    "lamotrigine": {name: "Lamotrigine", ir: {strength:"weak", maxH:1, thresh:"30 mg/kg"}, mr: {strength:"weak", maxH:4, thresh:"30 mg/kg"}},
};

let currentForm = "IR";

function populateDrugs() {
    const select = document.getElementById("drug");
    select.innerHTML = '<option value="">-- Select Poison --</option>';
    Object.keys(db).forEach(key => {
        const opt = document.createElement("option");
        opt.value = key;
        opt.textContent = db[key].name;
        select.appendChild(opt);
    });
}

function setForm(f) {
    currentForm = f;
    document.getElementById("btnIR").classList.toggle("bg-slate-900", f === "IR");
    document.getElementById("btnIR").classList.toggle("text-white", f === "IR");
    document.getElementById("btnMR").classList.toggle("border-slate-900", f === "MR");
    runRecommendation();
}

function updateHours() {
    document.getElementById("hours_val").textContent = parseFloat(document.getElementById("hours").value).toFixed(1) + " hours";
    runRecommendation();
}

function runRecommendation() {
    const key = document.getElementById("drug").value;
    if (!key) return;

    const drug = db[key];
    const hours = parseFloat(document.getElementById("hours").value);
    const data = (currentForm === "MR" && drug.mr) ? drug.mr : drug.ir;

    if (!document.getElementById("airway").checked || !document.getElementById("gi").checked) {
        document.getElementById("status").innerHTML = "❌ SAFETY CHECK FAILED — Confirm protected airway and no GI perforation risk";
        document.getElementById("status").className = "p-8 rounded-2xl text-center text-xl font-black mb-6 bg-red-600 text-white";
        document.getElementById("result").classList.remove("hidden");
        return;
    }

    let statusHTML = "";
    let statusClass = "";

    if (data.strength === "none") {
        statusHTML = "❌ NO ROLE — Activated Charcoal is NOT recommended";
        statusClass = "none";
    } else if (hours > (data.suggestH || data.maxH)) {
        statusHTML = `⚠️ Beyond recommended window`;
        statusClass = "bg-amber-600";
    } else if (data.strength === "strong") {
        statusHTML = "✅ STRONG RECOMMENDATION — Single-dose AC is recommended";
        statusClass = "strong";
    } else {
        statusHTML = "🟡 WEAK RECOMMENDATION / INDIVIDUAL RISK ASSESSMENT";
        statusClass = "weak";
    }

    document.getElementById("result").classList.remove("hidden");
    document.getElementById("drug_name").textContent = drug.name + " (" + currentForm + ")";
    document.getElementById("status").innerHTML = statusHTML;
    document.getElementById("status").className = `p-8 rounded-2xl text-center text-2xl font-black mb-6 ${statusClass}`;

    document.getElementById("details").innerHTML = `
        <div><strong>Threshold:</strong> ${data.thresh}</div>
        <div><strong>Time window:</strong> Strong up to ${data.maxH}h ${data.suggestH ? `, Weak up to ${data.suggestH}h` : ''}</div>
    `;
}

// Initialize
populateDrugs();
document.getElementById("hours").addEventListener("input", updateHours);
</script>
</body>
</html>
