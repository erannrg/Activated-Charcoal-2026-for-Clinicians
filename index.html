<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AC Tool 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6 font-sans">
<div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-xl p-8">

    <h1 class="text-3xl font-black mb-6">Activated Charcoal Tool 2026</h1>

    <div class="space-y-6">
        <div>
            <label class="block text-sm font-bold mb-2">Poison</label>
            <select id="drug" class="w-full p-4 border rounded-xl text-lg" onchange="run()">
                <option value="">-- Select --</option>
                <option value="paracetamol">Paracetamol (Acetaminophen)</option>
                <option value="opioids">Opioids</option>
                <option value="digoxin">Digoxin</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-bold mb-2">Formulation</label>
            <div class="flex gap-4">
                <button onclick="setForm('IR')" id="irBtn" class="flex-1 py-3 border-2 border-slate-900 bg-slate-900 text-white rounded-xl font-bold">IR</button>
                <button onclick="setForm('MR')" id="mrBtn" class="flex-1 py-3 border-2 rounded-xl font-bold">MR</button>
            </div>
        </div>

        <div>
            <label class="block text-sm font-bold mb-2">Hours since ingestion</label>
            <input type="range" id="hours" min="0" max="24" step="0.1" value="3.5" class="w-full" oninput="run()">
            <div class="text-center text-2xl font-bold mt-2" id="hoursText">3.5 hours</div>
        </div>

        <button onclick="run()" class="w-full py-5 bg-black text-white font-bold text-lg rounded-2xl">
            GET RECOMMENDATION
        </button>
    </div>

    <div id="result" class="hidden mt-8 p-6 border rounded-2xl">
        <h2 id="name" class="text-2xl font-bold mb-4"></h2>
        <div id="statusBox" class="p-6 rounded-xl text-center text-xl font-bold mb-4"></div>
        <div id="info" class="text-sm"></div>
    </div>
</div>

<script>
const db = {
    "paracetamol": {
        name: "Paracetamol (Acetaminophen)",
        ir: { strongUntil: 2, weakUntil: 4, thresh: "200 mg/kg" },
        mr: { strongUntil: 5, weakUntil: 6, thresh: "200 mg/kg" }
    },
    "opioids": {
        name: "Opioids",
        ir: { strongUntil: 0, weakUntil: 2, thresh: "5 TD" },
        mr: { strongUntil: 0, weakUntil: 2, thresh: "5 TD" }
    },
    "digoxin": {
        name: "Digoxin",
        ir: { strongUntil: 1, weakUntil: 2, thresh: "75 µg/kg" }
    }
};

let form = "IR";

function setForm(f) {
    form = f;
    document.getElementById("irBtn").classList.toggle("bg-slate-900", f==="IR");
    document.getElementById("irBtn").classList.toggle("text-white", f==="IR");
    document.getElementById("mrBtn").classList.toggle("border-slate-900", f==="MR");
    run();
}

function run() {
    const key = document.getElementById("drug").value;
    if (!key) return;

    const drug = db[key];
    const hours = parseFloat(document.getElementById("hours").value);
    document.getElementById("hoursText").textContent = hours.toFixed(1) + " hours";

    const data = (form === "MR" && drug.mr) ? drug.mr : drug.ir;

    let html = "";
    if (hours > (data.weakUntil || data.strongUntil)) {
        html = `<div class="bg-amber-100 text-amber-800 p-6 rounded-2xl">⚠️ Beyond recommended window</div>`;
    } else if (hours <= data.strongUntil) {
        html = `<div class="strong p-6 rounded-2xl">✅ STRONG RECOMMENDATION — Single-dose AC is recommended</div>`;
    } else {
        html = `<div class="weak p-6 rounded-2xl">🟡 WEAK RECOMMENDATION / INDIVIDUAL RISK ASSESSMENT</div>`;
    }

    document.getElementById("result").classList.remove("hidden");
    document.getElementById("name").textContent = drug.name + " (" + form + ")";
    document.getElementById("statusBox").innerHTML = html;
    document.getElementById("info").innerHTML = `<strong>Threshold:</strong> ${data.thresh || '—'}`;
}

// Init
document.getElementById("hours").addEventListener("input", run);
</script>
</body>
</html>
